<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrador de Tickets</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f5f6fa;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background-color: #007bff;
      color: white;
    }

    th, td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: center;
    }

    tr:hover {
      background-color: #f1f1f1;
    }

    .small {
      font-size: 14px;
      color: gray;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎫 Tickets Registrados</h1>
    <input type="text" id="buscador" placeholder="🔍 Buscar por nombre o correo...">

    <table id="tablaTickets">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Correo</th>
          <th>Números</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const tabla = document.querySelector("#tablaTickets tbody");
    const buscador = document.getElementById("buscador");

    async function cargarTickets() {
      try {
        const res = await fetch("http://localhost:5000/api/tickets/consulta");
        const data = await res.json();

        if (data.exito) {
          mostrarTickets(data.tickets);
        } else {
          alert("❌ No se pudo obtener los tickets");
        }
      } catch (err) {
        console.error("Error cargando tickets:", err);
      }
    }

    function mostrarTickets(tickets) {
      tabla.innerHTML = "";
      tickets.forEach(ticket => {
        const fila = document.createElement("tr");
        fila.innerHTML = `
          <td>${ticket.nombre}</td>
          <td>${ticket.correo}</td>
          <td>${ticket.numeros.map(n => n.toString().padStart(4, "0")).join(", ")}</td>
          <td><span class="small">${new Date(ticket.fecha).toLocaleString()}</span></td>
        `;
        tabla.appendChild(fila);
      });
    }

    buscador.addEventListener("input", () => {
      const valor = buscador.value.toLowerCase();
      const filas = tabla.querySelectorAll("tr");
      filas.forEach(fila => {
        const texto = fila.textContent.toLowerCase();
        fila.style.display = texto.includes(valor) ? "" : "none";
      });
    });

    cargarTickets();
  </script>
</body>
</html>
